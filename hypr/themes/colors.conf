exec = gsettings set org.gnome.desktop.interface gtk-theme 'Wallbash-Gtk'
exec = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

general {
    col.active_border = rgba(928174ff) rgba(1A1A1Aff) 45deg
    col.inactive_border = rgba(131411ff) rgba(3C3832ff) 45deg
}

group {
    col.border_active = rgba(928174ff) rgba(1A1A1Aff) 45deg
    col.border_inactive = rgba(131411cc) rgba(3C3832cc) 45deg
    col.border_locked_active = rgba(FFFFFFff) rgba(141414ff) 45deg
    col.border_locked_inactive = rgba(FFFFFFcc) rgba(FFFFFFcc) 45deg
}
